

apiVersion: apps/v1

kind: Deployment

metadata:

  name: retailpulse-ai

spec:

  replicas: 2

  selector:

    matchLabels:

      app: retailpulse

  template:

    metadata:

      labels:

        app: retailpulse

    spec:

      containers:

      - name: retailpulse

        image: retailpulse-ai:latest

        ports:

        - containerPort: 8501

